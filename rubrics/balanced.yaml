name: "Balanced 5-criterion rubric (qualitative grading)"
description: |
  Evaluates ideas against a 5-step investor decision logic.
  Each criterion is graded Strong / Neutral / Weak per idea, backed by 2+
  specific proofs (quotes from spec or shared context).
  Numeric 1-10 scoring was replaced because LLMs collapse to a 6/7/8 gradient,
  hiding real judgment in adjacent integers. The 3-grade system forces
  evidence-backed commitment.

# Grade definitions (apply to all criteria)
grading:
  - grade: Strong
    points: 1
    description: |
      Clear evidence-backed advantage on this criterion.
      Requires 2+ specific quotes (from the idea's spec OR shared context)
      that match the criterion's "Strong anchor". If the judge cannot cite
      proofs, downgrade to Neutral.
  - grade: Neutral
    points: 0
    description: |
      Evidence is mixed, weak both ways, OR insufficient to favor either side.
      Use this when the criterion is genuinely contested or when neither
      defender presented decisive evidence.
      NOT a default — only when warranted.
  - grade: Weak
    points: -1
    description: |
      Clear evidence-backed disadvantage on this criterion.
      Requires 2+ specific quotes — typically self-admissions in the spec, or
      counter-evidence in shared context — matching the criterion's "Weak anchor".

# Verdict math:
#   For each criterion: differential = (A_grade_points - B_grade_points) × weight
#   Sum across criteria → total_differential
#   Positive = A wins, Negative = B wins, Zero = tie (judge breaks via "deciding factor")
verdict_method: weighted_grade_differential

criteria:
  - id: strategic_ceiling
    name: "Strategic ceiling"
    weight: 1.5
    investor_step: "1 — Category & ceiling"
    grade_anchors: |
      Strong: spec or shared context cites a direct comp at $1B+ outcome at this exact thesis,
              with a clear path stated. Examples of citation: "Sky $80-120M ARR no ads",
              "Apollo $1.6B at $200M ARR".
      Neutral: plausible but adjacent comps only; OR spec admits "$100-500M outcome" without
               a direct comp at the exact thesis.
      Weak: spec admits "lifestyle utility / not a venture company" / "VC interest: Zero" /
            "Don't build alone"; OR shared context contains counter-evidence such as
            "category public-market multiple is mature/slow-growth" (e.g., Sansan 3x ARR).

  - id: wedge_and_market
    name: "Wedge & market evidence"
    weight: 1.5
    investor_step: "2 — Wedge & traction"
    grade_anchors: |
      ALL THREE required for Strong:
        (a) Sharp narrow entry expressible in ≤20 words.
        (b) Validated demand evidence in shared context (cite the line).
        (c) Specific competitor gap incumbents STRUCTURALLY won't fill (cite competitor table).
      Strong: all three present, each with citation.
      Neutral: 2 of 3 present, OR demand is hypothetical, OR wedge is broad/multi-pronged.
      Weak: 1 or fewer present; shared context contains anti-evidence such as "NO direct
            evidence of demand for X"; OR the wedge sits inside a saturated category
            with multiple billion-dollar incumbents.

  - id: moat_and_trust
    name: "Moat & trust posture"
    weight: 1.5
    investor_step: "3 + 4 — Architecture & moat + Trust"
    grade_anchors: |
      Strong: multiple compounding moats (data + network + brand + integration) AND clean
              trust posture; OR a structural moat that incumbents architecturally cannot
              copy (e.g., business-model conflict, KPI incompatibility — cite the specific
              reason). Trust posture is itself a competitive advantage (e.g. "no GPS ever",
              "no free-text surface").
      Neutral: one real moat with 12+ months copy time; standard trust hygiene, nothing flagged.
      Weak: spec admits "thin moat" / "defensibility is thin"; OR shared context flags
            "copyable in <6 months"; OR trust posture has structural diligence discount;
            OR the claimed moat is "feature parity an incumbent can ship in 1 quarter".

  - id: distinctiveness
    name: "Distinctiveness"
    weight: 1.0
    investor_step: "(cross-cutting brand axis)"
    grade_anchors: |
      Strong: passes the show-stranger 24h test; named new category OR memorable refusal
              manifesto; multiple defining design choices (e.g. "no faces", "no free text",
              "Risograph illustration", "60-phrase Dark Souls library"); the product cannot
              be confused with any existing alternative.
      Neutral: distinctive within category but not category-defining; recognizable but not
               memorable beyond first impression.
      Weak: indistinguishable from existing alternatives; commodity layer (e.g., "OCR scanner
            with one extra export destination"); positioning is a removal/feature toggle
            rather than a creation.

  - id: execution_credibility
    name: "Execution credibility"
    weight: 1.0
    investor_step: "5 — Execution credibility"
    grade_anchors: |
      Strong: solo-buildable with the founder's existing skills, ship in <8 weeks, no external
              blockers, explicit kill-gates defined.
      Neutral: solo + 1-2 contractors, 3-6 months, raise plausible but not yet secured.
      Weak: requires team founder cannot hire (e.g., "3-5 person studio"), OR raise founder
            cannot make (cite shared context), OR multi-year build, OR cultural-authority
            claim founder cannot make alone.
