name: Eval suite

# Runs the eval suite on every push and PR. Default suite is all
# auto-runnable evals (no live subagent calls), takes ~5 seconds.
# Manual evals (live subagent runs) are excluded — they require
# a Claude API key and a real network call per match, which doesn't
# belong in CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  evals:
    name: Run eval suite
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify scripts are executable
        run: |
          chmod +x scripts/*.sh
          ls -la scripts/

      - name: Run eval suite
        run: bash scripts/eval-suite.sh

      - name: Upload EVAL_RESULTS.md as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: EVAL_RESULTS.md
          if-no-files-found: warn
